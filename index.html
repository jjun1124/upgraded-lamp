<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>키오스크</title>

<!-- QR 스캐너 -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#000; color:#fff; text-align:center; }
#reader { width:300px; margin:auto; }
#result { margin-top:20px; font-size:24px; }
</style>
</head>

<body>

<h1>QR 스캔</h1>

<div id="reader"></div>

<div id="result">대기중...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔥 Firebase 동일하게 맞춰야됨
const firebaseConfig = {
    apiKey: "AIzaSyBCS0LCBvuVl2bhSawHJl6g7ry67Aj1gu4",
    authDomain: "find-korea.firebaseapp.com",
    databaseURL: "https://find-korea-default-rtdb.firebaseio.com",
    projectId: "find-korea",
    appId: "1:672927096828:web:597ab26d4ed32e97bd9c79"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 QR 스캔 성공
function onScanSuccess(decodedText) {
    document.getElementById("result").innerText = "조회중...";

    loadOrder(decodedText);
}

// 🔥 주문 조회
async function loadOrder(orderId) {
    try {
        const snapshot = await get(ref(db, "orders"));

        if(snapshot.exists()){
            const data = snapshot.val();

            let found = null;

            for (let key in data) {
                if (data[key].id === orderId) {
                    found = data[key];
                    break;
                }
            }

            if(found){
                document.getElementById("result").innerText =
                    "매장: " + found.store + "\n" +
                    "메뉴: " + found.menu + "\n" +
                    "가격: " + found.price + "원";
            } else {
                document.getElementById("result").innerText = "주문 없음";
            }
        }
    } catch(e){
        console.error(e);
        document.getElementById("result").innerText = "오류 발생";
    }
}

// 🔥 카메라 시작
const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
);
</script>

</body>
</html>
